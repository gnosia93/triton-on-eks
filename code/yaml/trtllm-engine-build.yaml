apiVersion: batch/v1
kind: Job
metadata:
  name: trtllm-engine-build
  namespace: default
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: trtllm-engine-build
    spec:
      restartPolicy: Never
      nodeSelector:
        node.kubernetes.io/instance-type: g6e.12xlarge
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      serviceAccountName: s3-access-sa    # IRSA로 S3 권한 부여
      containers:
        - name: builder
          image: nvcr.io/nvidia/tritonserver:26.02-trtllm-python-py3   # triton 은 서빙프로엠워크이다. HTTP/gRPC 엔드포인트, 요청 배칭, 스케줄링 등 처리
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              pip install -U "huggingface_hub<1.0" awscli
              
              echo "=== Downloading model ==="
              huggingface-cli download Qwen/Qwen2.5-72B-Instruct --local-dir /workspace/qwen-hf

              echo "=== Converting checkpoint ==="
              python3 /app/examples/models/core/qwen/convert_checkpoint.py \
                --model_dir /workspace/qwen-hf \
                --output_dir /workspace/qwen-trtllm-ckpt \
                --dtype bfloat16 \
                --tp_size 4

              echo "=== Building TRT-LLM engine ==="
              trtllm-build \
                --checkpoint_dir /workspace/qwen-trtllm-ckpt \
                --output_dir /workspace/engines/qwen \
                --max_input_len 4096 \
                --max_seq_len 8192 \
                --max_batch_size 64 \
                --gemm_plugin auto \
                --gpt_attention_plugin auto

              echo "=== Uploading to S3 ==="
              aws s3 cp /workspace/engines/qwen/ s3://${ENGINE_BUCKET}/trtllm-engines/qwen/ --recursive
              aws s3 cp /workspace/qwen-hf/ s3://${ENGINE_BUCKET}/trtllm-models/qwen-hf/ --recursive

              echo "=== Done ==="
          resources:
            limits:
              nvidia.com/gpu: "4"
            requests:
              nvidia.com/gpu: "4"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
        - name: workspace
          emptyDir: {}
